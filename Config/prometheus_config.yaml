global:
  scrape_interval: 1s      # Интервал сбора метрик
  scrape_timeout: 10s       # Время ожидания ответа от сервера
  evaluation_interval: 11s  # Интерва проверки праил аллертов

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']  # Мониторинг Prometheus

  - job_name: 'otel-collector'
    scrape_interval: 15s
    static_configs:
      - targets: ['otel-collector:8889']
    metrics_path: /metrics