syntax = "proto3";

package order_service.v2;

import "common/common.proto";
import "google/protobuf/timestamp.proto";
import "money/money.proto";
import "validate/validate.proto";

option go_package = "github.com/DenсCPU/gRPCServices/Protobuf/gen/order_service";

//Сервис управления заказами
service OrderService {
  rpc GetOrderStatus(GetOrderReq) returns (GetOrderResp); //Получение информации о заказе
  rpc CreateOrder(CreateOrderReq) returns (CreateOrderResp); //Создание заказа
  rpc StreamOrderUpdate(StreamOrderUpdateReq) returns (stream StreamOrderUpdateResp); //Получение актульного статуса заказа
}

//Запрос для GetOrderStatus
message GetOrderReq {
  string order_id = 1 [(validate.rules).string.uuid = true];
  string user_id = 2 [(validate.rules).string.uuid = true];
}

//Ответ для GetOrderStatus
message GetOrderResp {
  string order_status = 1;
  string order_id = 2;
  google.type.Money price = 3;
  int64 quantity = 4;
  string market_name = 5;
}

//Запрос для CreateOrder
message CreateOrderReq {
  string user_id = 1 [(validate.rules).string.uuid = true];
  string market_id = 2 [(validate.rules).string.uuid = true];
  OrderType order_type = 3;
  google.type.Money price = 4;
  int64 quantity = 5 [(validate.rules).int64.gte = 1];
  common.UserRole user_role = 6;
  string indempotency_key = 7 [(validate.rules).string.min_len = 1];
}

enum OrderType {
  ORDER_TYPE_UNSPECIFIED = 0;
  ORDER_TYPE_NORMAL = 1;
  ORDER_TYPE_EXPRESS = 2;
}

//Ответ для CreateOrder
message CreateOrderResp {
  string order_id = 1;
  string order_status = 2;
}

message StreamOrderUpdateReq {
  string order_id = 1 [(validate.rules).string.uuid = true];
  string user_id = 2 [(validate.rules).string.uuid = true];
}

message StreamOrderUpdateResp {
  string order_status = 1;
  google.protobuf.Timestamp update_status_time = 2;
}
