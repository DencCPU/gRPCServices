syntax = "proto3";

package spotAPI.v2; 

option go_package = "github.com/Dens-CPU/gRPCServices/Protobuf/gen/spot_service;spot";

//Предоставления данных о рынках
service SpotInstrumentService {
    rpc ViewMarket(ViewReq)returns(ViewResp); //Проверка доступных рынков
}

//Запрос для ViewMarket
message ViewReq{
    UserRoles user_roles = 1; //Поле для юзера
}

enum UserRoles{
    ROLE_UNSPECIFIED = 0;
    ROLE_BASIC_USER = 1;
    ROLE_PREMIUM_USER = 2;
}

//Ответ для ViewMarket
message ViewResp{
    repeated Markets enable_markets = 1;
}

message Markets{
    int64 market_id = 1;
    string market_name = 2;
}